<a
  [href]="href()"
  class="group block w-36 shrink-0"
>
  <article
    class="rounded-xl border border-base-300 bg-base-200/40 backdrop-blur-md py-4 px-6 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl"
    [ngClass]="style().border"
  >
    <div
      class="aspect-square overflow-hidden rounded-lg bg-base-300 ring-2 ring-base-300 transition-all"
      [ngClass]="style().ring"
    >
      <img
        [ngSrc]="image()"
        [alt]="title()"
        priority
        width="500" height="500" 
        class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110"
      />
    </div>

    <div class="mt-3 text-center">
      <h3 class="text-sm font-semibold text-base-content leading-tight">
        {{ title() }}
      </h3>
    </div>
  </article>
</a>
