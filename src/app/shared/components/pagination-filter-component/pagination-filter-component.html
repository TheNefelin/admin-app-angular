<form class="fieldset bg-base-200 border-base-300 rounded-box border p-4 flex items-center flex-wrap w-full">
  <fieldset class="fieldset">
    <label class="input">
      <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></g>
      </svg>
      <input 
        type="search" class="grow" placeholder="Buscar..." 
        (input)="onSearchInput($event)"/>
    </label>
  </fieldset>

  <fieldset class="fieldset">
    <input 
      type="number" class="input validator" placeholder="10 (cantidad de items)" min="1"
      (input)="onLimitInput($event)"/>
  </fieldset>

  <app-button-component (onClick)="onRefreshClick.emit()" class="ms-auto" [icon]="'refresh'" textBtn="Refrescar"/>
</form>
